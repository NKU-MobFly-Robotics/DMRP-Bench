map_type: costmap
origin_z: 0.0
z_resolution: 1
z_voxels: 2

obstacle_range: 10
raytrace_range: 10.1

publish_voxel_map: false
transform_tolerance: 0.3
meter_scoring: true

footprint: 
  type: "circle"
  radius: 0.35

global_frame: map

# choose one of "base_link" frame of the agents 
robot_base_frame: p1/base_link

update_frequency: 1.0
publish_frequency: 1.0
width: 60.0
height: 60.0
resolution: 0.05
origin_x: -30.0
origin_y: -30.0
static_map: false
rolling_window: false

   
plugins:
- {name: static_layer, type: "costmap_2d::StaticLayer"}
- {name: inflater_layer, type: "costmap_2d::InflationLayer"}

static_layer:
  map_topic: /map
  first_map_only: true

inflater_layer:
 inflation_radius: 0.7 #freeOffice为0.5  Library是0.3  Shopping是0.7
