---
#---standard pioneer footprint---
#---(in meters)---
origin_z: 0.0
z_resolution: 1
z_voxels: 2

robot_radius: 0.12  
footprint_padding: 0.01 #0.01

transform_tolerance: 0.2

always_send_full_costmap: true

obstacle_layer:
  enabled: true
  obstacle_range: 3.0
  raytrace_range: 4.0
  track_unknown_space: true
  combination_method: 1
  observation_sources: scan
  scan:
    { data_type: LaserScan, topic: RosAria/scan, marking: true, clearing: true, inf_is_valid: true ,sensor_frame: base_link, mark_threshold: 1}


inflation_layer:
  enabled: true
  cost_scaling_factor: 3 #原本是5 exponential rate at which the obstacle cost drops off (default: 10)
  inflation_radius: 0.2 #原本0.1 sddsdasdsadsad max. distance from an obstacle at which costs are incurred for planning paths (default: 0.55)

static_layer:
  enabled: true
  map_topic: "/map"
