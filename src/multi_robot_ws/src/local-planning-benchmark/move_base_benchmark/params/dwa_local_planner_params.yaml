DWAPlannerROS:

  # Robot Configuration Parameters
  max_vel_x: 0.8
  min_vel_x: 0.0
  max_vel_theta: 1.0
  min_vel_theta: 0.2

  acc_lim_x: 1.0
  acc_lim_theta: 1.0

  # Goal Tolerance Parameters (重要: 收紧容忍度)
  xy_goal_tolerance: 0.01    # 5cm
  yaw_goal_tolerance: 0.05   # ~3°
  
  footprint_model:
    type: "circle"
    radius: 0.2 # 0.15 

  # Trajectory Simulation Parameters
  sim_time: 1 
  sim_granularity: 0.025
  angular_sim_granularity: 0.1

  vx_samples: 20
  vy_samples: 0
  vtheta_samples: 40

  # Trajectory Scoring Parameters
  path_distance_bias: 5.0    
  goal_distance_bias: 1.0    
  occdist_scale: 2           

  twirling_scale: 0.0

  stop_time_buffer: 0.2
  oscillation_reset_dist: 0.05
  oscillation_reset_angle: 0.2

  forward_point_distance: 0.28

  scaling_speed: 0.25
  max_scaling_factor: 0.2

  # Additional Settings
  use_dwa: true
  restore_defaults: false
  trans_stopped_vel: 0.02
  theta_stopped_vel: 0.1
